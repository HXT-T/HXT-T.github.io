<p>定期复盘是进步的关键。以下是我使用的五维度周复盘框架：</p>

<h2 id="一工作学习">一、工作/学习</h2>

<ul>
  <li>本周完成的主要事项</li>
  <li>遇到的困难与解决方案</li>
  <li>下周重点计划</li>
</ul>

<h2 id="二健康">二、健康</h2>

<ul>
  <li>运动次数与类型</li>
  <li>睡眠质量</li>
  <li>饮食规律</li>
</ul>

<h2 id="三关系">三、关系</h2>

<ul>
  <li>与家人/朋友的互动</li>
  <li>需要维护的重要关系</li>
</ul>

<h2 id="四兴趣">四、兴趣</h2>

<ul>
  <li>阅读、电影、音乐</li>
  <li>新尝试的事物</li>
</ul>

<h2 id="五能量与情绪">五、能量与情绪</h2>

<ul>
  <li>本周情绪基调（1-10 分）</li>
  <li>能量高峰与低谷时段</li>
  <li>需要调整的地方</li>
</ul>

<hr />

<p>坚持记录，时间会给出答案。</p>
